<div class="login-page">
  <div class="container">
    <div class="login-container">
      <div class="login-card">
        <h2>Login</h2>
        <p class="subtitle">Welcome back! Please login to your account.</p>

        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              formControlName="email"
              [class.input-invalid]="f.email.touched && f.email.invalid"
              placeholder="Enter your email"
            />
            <small class="field-error" *ngIf="f.email.touched && f.email.errors?.['required']">
              Email is required.
            </small>
            <small class="field-error" *ngIf="f.email.touched && f.email.errors?.['email']">
              Enter a valid email address.
            </small>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              formControlName="password"
              [class.input-invalid]="f.password.touched && f.password.invalid"
              placeholder="Enter your password"
            />
            <small class="field-error" *ngIf="f.password.touched && f.password.errors?.['required']">
              Password is required.
            </small>
            <small class="field-error" *ngIf="f.password.touched && f.password.errors?.['minlength']">
              Password must be at least 8 characters.
            </small>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            [disabled]="loginForm.invalid || isLoading"
          >
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>
        </form>

        <div class="login-footer">
          <p>Don't have an account? <a routerLink="/register">Register here</a></p>
        </div>

      </div>
    </div>
  </div>
</div>
