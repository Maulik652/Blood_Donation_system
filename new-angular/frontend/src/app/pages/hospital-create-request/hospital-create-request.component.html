<div class="hospital-create page-shell auth-page-shell">
  <div class="container">
    <section class="card hero auth-hero">
      <div>
        <p class="zone-kicker">Hospital / Create Request</p>
        <h1>Create Blood Request</h1>
        <p class="muted">Post urgent blood requirements and notify matching donors instantly.</p>
      </div>

      <div class="quick-links auth-links">
        <a routerLink="/hospital/create-request" class="chip chip-active">Create Request</a>
        <a routerLink="/hospital/requests" class="chip">Requests</a>
        <a routerLink="/hospital/inventory" class="chip">Inventory</a>
        <a routerLink="/hospital/profile" class="chip">Profile</a>
      </div>
    </section>

    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

    <section class="card form-wrap auth-surface">
      <h2>Request Details</h2>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="grid grid-2">
          <div class="form-group">
            <label for="bloodGroup">Blood Group *</label>
            <select id="bloodGroup" formControlName="bloodGroup" class="form-control" [class.input-invalid]="f.bloodGroup.touched && f.bloodGroup.invalid">
              <option value="">Select blood group</option>
              <option *ngFor="let group of bloodGroups" [value]="group">{{ group }}</option>
            </select>
          </div>

          <div class="form-group">
            <label for="urgency">Urgency *</label>
            <select id="urgency" formControlName="urgency" class="form-control" [class.input-invalid]="f.urgency.touched && f.urgency.invalid">
              <option *ngFor="let level of urgencies" [value]="level">{{ level }}</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" formControlName="message" class="form-control" rows="5" [class.input-invalid]="f.message.touched && f.message.invalid" placeholder="Describe quantity, timing, and any special instructions..."></textarea>
          <small class="field-error" *ngIf="f.message.touched && f.message.errors?.['required']">Message is required.</small>
          <small class="field-error" *ngIf="f.message.touched && f.message.errors?.['minlength']">Message must be at least 10 characters.</small>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating...' : 'Create Request' }}
        </button>
      </form>
    </section>
  </div>
</div>
