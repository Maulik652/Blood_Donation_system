<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="logo">
      <span class="logo-icon">🩸</span>
      <span class="logo-text">BloodConnect</span>
      <span class="logo-icon">🩸</span>
    </a>

    <div class="menu-btn" (click)="toggleMenu()" [class.active]="isMenuOpen" aria-label="Toggle menu">
      <span class="line"></span>
      <span class="line"></span>
      <span class="line"></span>
    </div>

    <div class="menu" [class.active]="isMenuOpen">
      <ul>

        <li *ngFor="let link of navLinks">
          <a
            [routerLink]="link.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: link.route === '/home' || link.route === '/'}"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        </li>

        <ng-container *ngIf="!isLoggedIn">
          <li><a routerLink="/login" class="login-btn" (click)="closeMenu()">Login</a></li>
          <li><a routerLink="/register" class="register-btn" (click)="closeMenu()">Register</a></li>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
          <li>
            <button class="logout" (click)="logout()">Logout</button>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
