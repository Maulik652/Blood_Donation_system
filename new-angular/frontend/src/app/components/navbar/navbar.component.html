<nav class="navbar">

  <div class="nav-container">

    <!-- Logo -->
    <a routerLink="/" class="logo">
      <span class="logo-icon">🩸</span>
      <span class="logo-text">BloodConnect</span>
    </a>

    <!-- Mobile Toggle -->
    <div class="menu-btn" (click)="toggleMenu()">
      <span [class.open]="isMenuOpen">☰</span>
    </div>

    <!-- Menu -->
    <div class="menu" [class.active]="isMenuOpen">

      <ul>

        <li>
          <a routerLink="/" routerLinkActive="active"
             [routerLinkActiveOptions]="{exact:true}"
             (click)="closeMenu()">Home</a>
        </li>

        <li>
          <a routerLink="/about" routerLinkActive="active"
             (click)="closeMenu()">About</a>
        </li>

        <li>
          <a routerLink="/events" routerLinkActive="active"
             (click)="closeMenu()">Events</a>
        </li>

        <li>
          <a routerLink="/contact" routerLinkActive="active"
             (click)="closeMenu()">Contact</a>
        </li>

        <!-- Guest -->
        <ng-container *ngIf="!isLoggedIn">

          <li>
            <a routerLink="/login" class="login-btn"
               (click)="closeMenu()">Login</a>
          </li>

          <li>
            <a routerLink="/register" class="register-btn"
               (click)="closeMenu()">Register</a>
          </li>

        </ng-container>

        <!-- Logged In -->
        <ng-container *ngIf="isLoggedIn">

          <li>
            <a [routerLink]="
                userRole === 'user' ? '/donor-dashboard' :
                userRole === 'hospital' ? '/hospital-dashboard' :
                '/admin-dashboard'
              "
              class="dashboard"
              (click)="closeMenu()">
              Dashboard
            </a>
          </li>

          <li class="user-area">
            <div class="avatar">
              {{ userName.charAt(0) }}
            </div>
            <span>{{ userName }}</span>
          </li>

          <li>
            <button class="logout" (click)="logout()">
              Logout
            </button>
          </li>

        </ng-container>

      </ul>

    </div>

  </div>

</nav>
